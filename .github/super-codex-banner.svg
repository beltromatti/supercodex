<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Super Codex">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b1f"/>
      <stop offset="55%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#2d1b69"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>

  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="120" y1="0" x2="120" y2="360"/>
    <line x1="1080" y1="0" x2="1080" y2="360"/>
  </g>

  <g stroke="#22d3ee" stroke-width="2.5" fill="none" opacity="0.75">
    <path d="M 70 70 L 40 70 L 40 100"/>
    <path d="M 1130 70 L 1160 70 L 1160 100"/>
    <path d="M 70 290 L 40 290 L 40 260"/>
    <path d="M 1130 290 L 1160 290 L 1160 260"/>
  </g>

  <text x="600" y="180" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900" font-size="112" fill="url(#title)"
        letter-spacing="10" filter="url(#glow)">
    SUPER CODEX
  </text>

  <line x1="400" y1="210" x2="800" y2="210" stroke="url(#accent)" stroke-width="1.5"/>

  <text x="600" y="240" text-anchor="middle"
        font-family="'SF Mono', Menlo, Consolas, monospace"
        font-size="16" fill="#cbd5e1" letter-spacing="6">
    AN UNOFFICIAL FORK OF OPENAI CODEX
  </text>

  <text x="600" y="310" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="300" font-size="14" fill="#64748b" letter-spacing="3">
    MULTI-ACCOUNT  ·  SELF-HOSTED MODELS  ·  COMMUNITY-DRIVEN
  </text>
</svg>
